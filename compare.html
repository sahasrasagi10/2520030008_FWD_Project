<!DOCTYPE html>
<html>

<head>
    <title>Cricket Analysis Tools</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="page-header">

        <a href="index.html" class="back-link">← Back to Home</a>

        <h1>Cricket Analysis Tools</h1>

    </header>

    <section class="compare-wrapper">


        <div class="compare-card">

            <h2>Head-to-Head Analysis</h2>

            <div class="inputs-row">

                <div class="input-group">

                    <label>Team A</label>
                    <select id="teamA"></select>

                </div>

                <div class="input-group">

                    <label>Team B</label>
                    <select id="teamB"></select>

                </div>

            </div>

            <div class="input-group">

                <label>Format</label>

                <select id="format">

                    <option value="">Select Format</option>
                    <option value="ODI">ODI</option>
                    <option value="T20">T20</option>
                    <option value="Test">Test</option>

                </select>

            </div>

            <button onclick="compareTeams()" class="btn-primary">

                Compare

            </button>

            <div id="result" class="result-card">

                Select teams and format.

            </div>

        </div>



        <div class="compare-card">

            <h2>Required Run Rate Calculator</h2>

            <div class="inputs-row">

                <div class="input-group">

                    <label>Target Score</label>
                    <input type="number" id="targetScore">

                </div>

                <div class="input-group">

                    <label>Current Score</label>
                    <input type="number" id="currentScore">

                </div>

            </div>


            <div class="inputs-row">

                <div class="input-group">

                    <label>Total Overs</label>
                    <input type="number" id="totalOvers">

                </div>

                <div class="input-group">

                    <label>Overs Bowled</label>
                    <input type="number" id="oversBowled">

                </div>

            </div>


            <button onclick="calculateRRR()" class="btn-primary">

                Calculate

            </button>

            <div id="rrrResult" class="result-card">

                Enter match details.

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
